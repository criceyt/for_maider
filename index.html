<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buenos días ☀️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --black: #0A0A0A;
            --white: #FDFAF7;
            --gold: #C8A96E;
            --gold-pale: #F5ECD9;
            --ink: #1E1A16;
            --muted: #8A7D6E;
            --film-border: #F0E6D0;
            --film-hole: #D4C4A8;
        }

        html, body {
            height: 100%;
            background: var(--black);
            font-family: 'DM Sans', sans-serif;
            color: var(--white);
            overflow-x: hidden;
        }

        /* ══════════════════════════════
           PANTALLA 1 — VIDEOLLAMADA
        ══════════════════════════════ */
        #screen-call {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #screen-call.hide {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
        }

        /* Vídeo a pantalla completa */
        #hero-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--black);
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        #hero-video.visible { opacity: 1; }

        /* Overlay oscuro sobre el vídeo */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.15) 0%,
                rgba(0,0,0,0.0) 40%,
                rgba(0,0,0,0.55) 100%
            );
            z-index: 2;
        }

        /* Estado inicial: pantalla de "llamada entrante" antes de que arranque el vídeo */
        #call-ui {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            text-align: center;
            padding: 0 32px;
        }

        .call-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: rgba(200,169,110,0.15);
            border: 1.5px solid rgba(200,169,110,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin-bottom: 20px;
            animation: callPulse 2s ease-in-out infinite;
        }

        @keyframes callPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0.3); }
            50%       { box-shadow: 0 0 0 18px rgba(200,169,110,0); }
        }

        .call-name {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.5rem;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            margin-bottom: 6px;
        }

        .call-status {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .call-status span {
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .call-status span:nth-child(2) { animation-delay: 0.2s; }
        .call-status span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 1; }
        }

        .btn-play-call {
            background: var(--gold);
            border: none;
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-play-call:active { transform: scale(0.95); }

        /* Botón saltar que aparece cuando el vídeo está corriendo */
        #btn-skip {
            position: absolute;
            bottom: 44px;
            right: 28px;
            z-index: 20;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.8);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.70rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            display: none;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
        }

        #btn-skip:hover { background: rgba(255,255,255,0.2); }

        /* ══════════════════════════════
           PANTALLA 2 — GALERÍA
        ══════════════════════════════ */
        #screen-gallery {
            display: none;
            opacity: 0;
            transition: opacity 0.9s ease;
            background: var(--white);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        #screen-gallery.visible {
            display: block;
            opacity: 1;
        }

        /* Header buenos días */
        .gallery-header {
            background: var(--white);
            padding: 56px 28px 32px;
            text-align: center;
            position: relative;
        }

        .buenos-dias-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .buenos-dias-title {
            font-family: 'Caveat', cursive;
            font-size: 3.4rem;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 14px;
        }

        .buenos-dias-sub {
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.7;
            max-width: 280px;
            margin: 0 auto;
        }

        .header-rule {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 24px auto 0;
            opacity: 0.6;
        }

        /* ── TIRA DE PELÍCULA ── */
        .film-strip-container {
            padding: 20px 0 0;
            overflow: hidden;
        }

        /* Cada "frame" de película */
        .film-frame {
            position: relative;
            margin: 0 auto 48px;
            width: calc(100% - 80px);
            max-width: 260px;
            opacity: 0;
            transform: translateY(40px) rotate(var(--tilt, 0deg));
            transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .film-frame.revealed {
            opacity: 1;
            transform: translateY(0) rotate(var(--tilt, 0deg));
        }

        /* Perforaciones de película arriba y abajo */
        .film-perfs {
            display: flex;
            justify-content: space-between;
            padding: 0 8px;
            margin-bottom: 4px;
        }

        .film-perfs.bottom { margin-top: 4px; margin-bottom: 0; }

        .perf {
            width: 14px;
            height: 10px;
            border-radius: 2px;
            background: var(--film-hole);
            opacity: 0.7;
        }

        /* El polaroid en sí */
        .polaroid {
            background: var(--film-border);
            padding: 10px 10px 36px;
            border-radius: 3px;
            box-shadow:
                0 2px 8px rgba(0,0,0,0.06),
                0 12px 28px rgba(0,0,0,0.08);
            position: relative;
        }

        .polaroid-photo {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            border-radius: 1px;
            filter: saturate(0.92) contrast(1.03);
            background: #D4C4A8; /* placeholder color */
        }

        /* Placeholder cuando no hay foto real */
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #E8DFD0 0%, #D4C4A8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1px;
            font-size: 2.5rem;
            opacity: 0.6;
        }

        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--ink);
            text-align: center;
            padding-top: 10px;
            line-height: 1.3;
        }

        /* Número de foto (estilo negativo de carrete) */
        .frame-number {
            position: absolute;
            top: -22px;
            right: 12px;
            font-size: 0.60rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--muted);
            font-family: 'DM Sans', monospace;
            opacity: 0.5;
        }

        /* ── MENSAJE FINAL ── */
        .final-message {
            text-align: center;
            padding: 16px 36px 0;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .final-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .final-rule {
            width: 32px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 28px;
            opacity: 0.5;
        }

        .final-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--ink);
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .final-sign {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 500;
        }

        /* ── BOTÓN VOLVER A VER ── */
        .btn-replay {
            display: block;
            margin: 36px auto 0;
            background: transparent;
            border: 1px solid rgba(200,169,110,0.4);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 26px;
            border-radius: 60px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-replay:hover { border-color: var(--gold); color: var(--ink); }
    </style>
</head>
<body>

<!-- ══ PANTALLA 1: VIDEOLLAMADA ══ -->
<div id="screen-call">
    <video id="hero-video" src="video.mp4" playsinline webkit-playsinline muted></video>
    <div class="video-overlay"></div>

    <div id="call-ui">
        <div class="call-avatar">☀️</div>
        <div class="call-name">Buenos días, bonita</div>
        <div class="call-status">
            <span>•</span><span>•</span><span>•</span>
            &nbsp;tengo algo para ti
        </div>
        <button class="btn-play-call" onclick="startVideo()">Ver tu sorpresa</button>
    </div>

    <button id="btn-skip" onclick="goToGallery()">Saltar →</button>
</div>

<!-- ══ PANTALLA 2: GALERÍA ══ -->
<div id="screen-gallery">

    <div class="gallery-header">
        <div class="buenos-dias-label">Para ti, hoy</div>
        <h1 class="buenos-dias-title">Buenos días,<br>pequeña ❤️</h1>
        <p class="buenos-dias-sub">Cada foto es un momento que me alegra el día. Espero que a ti también.</p>
        <div class="header-rule"></div>
    </div>

    <div class="film-strip-container" id="film-strip">
        <!-- Las fotos se generan por JS — edita el array PHOTOS abajo -->
    </div>

    <div class="final-message" id="final-message">
        <div class="final-rule"></div>
        <p class="final-text">No sé si te das cuenta de lo bien que le sienta al mundo<br>que tú estés despierta en él.</p>
        <div class="final-sign">Con mucho cariño ♡</div>
        <button class="btn-replay" onclick="replayVideo()">Ver el vídeo otra vez</button>
    </div>

</div>

<script>
/* ════════════════════════════════════════════
   ★  EDITA AQUÍ TUS FOTOS Y FRASES  ★
   
   src: nombre del archivo (pon las fotos en
        la misma carpeta que index.html)
   caption: la frase que aparece debajo
════════════════════════════════════════════ */
const PHOTOS = [
    { src: 'foto1.jpg', caption: 'Aquí me di cuenta de que eres especial' },
    { src: 'foto2.jpg', caption: 'Esta sonrisa tuya, pa guardarla' },
    { src: 'foto3.jpg', caption: 'El mejor plan que tuvimos' },
    { src: 'foto4.jpg', caption: 'Mírate. Así de bien se te ve' },
    { src: 'foto5.jpg', caption: 'No hace falta filtro cuando eres tú' },
    { src: 'foto6.jpg', caption: 'Este momento no me lo olvido' },
    { src: 'foto7.jpg', caption: 'Eres demasiado bonita, en serio' },
];

/* Inclinación alterna suave para dar vida */
const TILTS = [-1.5, 1.2, -0.8, 1.8, -1.2, 0.9, -1.6];

/* ════════════════════════════════════════════ */

const video   = document.getElementById('hero-video');
const skipBtn = document.getElementById('btn-skip');

function startVideo() {
    document.getElementById('call-ui').style.opacity = '0';
    document.getElementById('call-ui').style.transform = 'scale(0.95)';

    setTimeout(() => {
        document.getElementById('call-ui').style.display = 'none';
        video.muted = false;
        video.play().catch(() => {
            /* Si el autoplay con sonido falla, lo dejamos muted */
            video.muted = true;
            video.play();
        });
        video.classList.add('visible');

        setTimeout(() => {
            skipBtn.style.display = 'block';
        }, 1500);
    }, 400);

    video.addEventListener('ended', goToGallery, { once: true });
}

function goToGallery() {
    const callScreen    = document.getElementById('screen-call');
    const galleryScreen = document.getElementById('screen-gallery');

    callScreen.classList.add('hide');

    setTimeout(() => {
        callScreen.style.display = 'none';
        galleryScreen.style.display = 'block';
        window.scrollTo(0, 0);

        setTimeout(() => {
            galleryScreen.classList.add('visible');
            buildFilmStrip();
            revealFrames();
        }, 80);
    }, 800);
}

function buildFilmStrip() {
    const strip = document.getElementById('film-strip');
    strip.innerHTML = '';

    PHOTOS.forEach((photo, i) => {
        const tilt = TILTS[i % TILTS.length];

        const frame = document.createElement('div');
        frame.className = 'film-frame';
        frame.style.setProperty('--tilt', tilt + 'deg');

        /* Número de fotograma estilo carrete */
        const num = document.createElement('div');
        num.className = 'frame-number';
        num.textContent = String(i + 1).padStart(2, '0') + 'A';

        /* Perforaciones arriba */
        frame.appendChild(num);
        frame.appendChild(makePerfs());

        /* Polaroid */
        const polaroid = document.createElement('div');
        polaroid.className = 'polaroid';

        const img = document.createElement('img');
        img.className = 'polaroid-photo';
        img.src = photo.src;
        img.alt = photo.caption;
        img.onerror = function() {
            /* Si la foto no carga, muestra un placeholder bonito */
            this.style.display = 'none';
            const ph = document.createElement('div');
            ph.className = 'photo-placeholder';
            ph.textContent = ['🌸','✨','💛','🌿','☀️','🌙','💫'][i % 7];
            polaroid.insertBefore(ph, this);
        };

        const caption = document.createElement('div');
        caption.className = 'polaroid-caption';
        caption.textContent = photo.caption;

        polaroid.appendChild(img);
        polaroid.appendChild(caption);
        frame.appendChild(polaroid);

        /* Perforaciones abajo */
        frame.appendChild(makePerfs(true));

        strip.appendChild(frame);
    });
}

function makePerfs(bottom = false) {
    const row = document.createElement('div');
    row.className = 'film-perfs' + (bottom ? ' bottom' : '');
    for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'perf';
        row.appendChild(p);
    }
    return row;
}

function revealFrames() {
    const frames = document.querySelectorAll('.film-frame');
    frames.forEach((frame, i) => {
        setTimeout(() => {
            frame.classList.add('revealed');

            /* Tras la última foto, muestra el mensaje final */
            if (i === frames.length - 1) {
                setTimeout(() => {
                    document.getElementById('final-message').classList.add('visible');
                }, 700);
            }
        }, 300 + i * 380);
    });
}

function replayVideo() {
    const callScreen    = document.getElementById('screen-call');
    const galleryScreen = document.getElementById('screen-gallery');
    const callUI        = document.getElementById('call-ui');

    galleryScreen.classList.remove('visible');

    setTimeout(() => {
        galleryScreen.style.display = 'none';
        callScreen.style.display    = 'flex';
        callScreen.classList.remove('hide');
        callScreen.style.opacity    = '1';
        callUI.style.display        = 'flex';
        callUI.style.opacity        = '1';
        callUI.style.transform      = '';
        video.classList.remove('visible');
        video.pause();
        video.currentTime = 0;
        skipBtn.style.display = 'none';
    }, 500);
}
</script>
</body>
</html>
